{% extends 'base.html' %}
{% block title %}Login — PhishGuard{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 100px);">
  <div class="w-100" style="max-width: 440px;">

    <!-- Logo / heading -->
    <div class="text-center mb-4">
      <div class="mb-3">
        <span style="font-size: 3rem; color: #0d6efd;">
          <i class="bi bi-shield-fill-check"></i>
        </span>
      </div>
      <h2 class="fw-bold mb-1">Welcome back</h2>
      <p class="text-muted small">Sign in to your PhishGuard account</p>
    </div>

    <!-- Card -->
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form action="{{ url_for('auth.login') }}" method="POST" novalidate>

          <!-- Email -->
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email address</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-envelope text-muted"></i>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control border-start-0 ps-0"
                placeholder="you@example.com"
                value="{{ request.form.get('email', '') }}"
                required
                autofocus
              />
            </div>
          </div>

          <!-- Password -->
          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <label for="password" class="form-label fw-semibold mb-0">Password</label>
            </div>
            <div class="input-group mt-1">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control border-start-0 border-end-0 ps-0"
                placeholder="Your password"
                required
              />
              <button
                type="button"
                class="input-group-text bg-light"
                id="togglePassword"
                title="Show / hide password"
              >
                <i class="bi bi-eye text-muted" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <div class="d-grid mb-3">
            <button type="submit" class="btn btn-primary py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- Register link -->
    <p class="text-center text-muted small mt-3">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">
        Create one free
      </a>
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const toggleBtn = document.getElementById('togglePassword');
  const pwField   = document.getElementById('password');
  const eyeIcon   = document.getElementById('eyeIcon');

  toggleBtn.addEventListener('click', () => {
    const show = pwField.type === 'password';
    pwField.type  = show ? 'text' : 'password';
    eyeIcon.className = show ? 'bi bi-eye-slash text-muted' : 'bi bi-eye text-muted';
  });
</script>
{% endblock %}
